# API 凭据 — 复制为 config/api_credentials.yaml 后填写 (已 gitignore, 不会被提交)
# 用于 verify_holdings.py 校验手填持仓与券商/交易所实际持仓是否一致。
# 只需要"读取"权限的 API Key, 不要开交易/提现权限。

# OKX: 官网 → 账户 → API → 创建 API Key (权限只勾"读取")
okx:
  api_key: ""
  secret_key: ""
  passphrase: ""

# Schwab: developer.schwab.com 注册开发者账号 → 创建 App (Trader API - Individual)
# → 完成一次 OAuth 授权拿到 refresh_token (有效期7天, 过期需重新授权)
schwab:
  app_key: ""
  app_secret: ""
  refresh_token: ""
