# 主动风险预算是政策参数，不由回测收益或 Sharpe 自动决定。
# 当前为 0，因此示例策略不会获得真实资金。接入并验证自己的策略收益后，
# 可从 0.05 开始影子/小额运行，再按明确审批提升；建议硬上限不超过 0.30。
active_risk_budget: 0.0
active_capital_cap: 0.25
active_band: 0.05         # 主动策略不交易区带宽；目标为零时自动收窄为零

# 策略层风险估计。日频 EWMA 波动率与三日重叠相关性分开估计。
risk_estimation:
  vol_ewma_span: 35
  vol_min_periods: 20
  overlap_days: 3
  correlation_ewma_span: 126
  min_common_observations: 63
  max_staleness_days: 5
  correlation_shrinkage: 0.50
  fallback_correlation: 0.50
  eigenvalue_floor: 1.0e-6

# 核心配置与主动组合在月频收益上估计相关性；样本不足时使用保守后备值。
top_level_risk:
  passive_vol_ewma_span_months: 12
  correlation_ewma_span_months: 36
  min_common_months: 24
  correlation_shrinkage: 0.50
  fallback_correlation: 0.50
  correlation_floor: 0.20

# ── 接口A: 手动执行账户 ──
# 账户金额与角色额度听模型, 账户内买什么标的自己定 (实现自由, 不算主观判断)。
# 例: 同花顺的 CN_equity 额度可以买任何沪深300指数基金, CN_GOVT 买任何国债基金。
# 列在这里的账户, 输出时会标注"标的自选", 提醒各角色额度只约束资产类别不约束具体产品。
manual_execution:
  - 同花顺
  - ZA

# ── 接口B: 账户 -> 主动策略列表 ──
# 每个账户可以放多个策略。想在某账户主动择时/选股, 在这里加条目 —
# 它会和其他量化策略一起走分层风险预算；资金总预算必须由人明确批准，
# 被动树里对应市场的腿保持不变 (锚的结构不因此破坏)。
# 生产用 returns_path 指向扣除费用、已折算为 CNY 的日收益 CSV/Parquet。
# 必需列默认是 date 和 return，可用 date_column/return_column 覆盖。
# 没有 returns_path 时仅以手填 vol + fallback_correlation 运行，并在诊断中告警。
accounts:
  Schwab量化:
    risk_budget: 1.0
    strategies:
      - name: 示例策略A
        enabled: true
        account_currency: USD
        returns_path: null   # 例: ../other-project/output/daily_returns.csv
        returns_currency: CNY
        returns_net_of_costs: true
        risk_budget: 1.0
        allocation_confidence: 1.0
        max_active_weight: 0.60
        vol: 0.15            # 仅 returns_path=null 时使用

  OKX量化:
    risk_budget: 1.0
    strategies:
      - name: 示例策略B
        enabled: true
        account_currency: USD
        returns_path: null
        returns_currency: CNY
        returns_net_of_costs: true
        risk_budget: 1.0
        allocation_confidence: 1.0
        max_active_weight: 0.60
        vol: 0.30

  # 同花顺手动:            # 想在A股主动选股/择时时取消注释
  #   strategies:
  #     - name: A股手动策略
  #       returns_path: null
  #       vol: 0.20

  # ZA手动:               # 想在港股主动选股/择时时取消注释
